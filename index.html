<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%BASE_URL%favicon.ico" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link
      id="apple-touch-icon"
      rel="apple-touch-icon"
      sizes="180x180"
      href="%BASE_URL%apple-touch-icon-light.png"
    />
    <meta name="theme-color" content="#ffffff" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="ib1zza" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      rel="preload"
      href="%BASE_URL%fonts/ChiKareGo2.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <link
      rel="preload"
      href="%BASE_URL%fonts/FindersKeepers.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <title>ib1zza</title>
    <script>
      (() => {
        const icon = document.getElementById("apple-touch-icon");
        const darkQuery = window.matchMedia?.("(prefers-color-scheme: dark)");
        const baseUrl = "%BASE_URL%";
        const setAppleTouchIcon = () => {
          if (!icon) return;
          icon.href = `${baseUrl}apple-touch-icon-${
            darkQuery?.matches ? "dark" : "light"
          }.png`;
        };

        setAppleTouchIcon();
        darkQuery?.addEventListener?.("change", setAppleTouchIcon);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
