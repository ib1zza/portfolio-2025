<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Invaders Icons</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; color: #222; padding: 20px; }
h1 { font-size: 24px; margin-bottom: 8px; }
p.sub { font-size: 13px; color: #666; margin-bottom: 24px; }
.section { margin-bottom: 32px; }
.section h2 { font-size: 18px; margin-bottom: 12px; padding-bottom: 4px; border-bottom: 2px solid #222; }
.grid { display: flex; flex-wrap: wrap; gap: 2px; }
.card { display: flex; flex-direction: column; align-items: center; width: 64px; padding: 6px 2px 4px; background: #fff; border: 1px solid #ddd; border-radius: 4px; }
.card svg { width: 32px; height: 32px; display: block; }
.card .label { font-size: 9px; color: #555; margin-top: 4px; text-align: center; word-break: break-all; max-width: 60px; line-height: 1.2; }
.loading { padding: 20px; color: #888; }
.error { padding: 20px; color: #c00; }
</style>
</head>
<body>
<h1>Space Invaders Icons</h1>
<p class="sub">SVG glyphs extracted from 3 TTF font families</p>
<div id="root" class="loading">Loading…</div>
<script>
(async () => {
  try {
    const res = await fetch('fonts/manifest.json');
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const manifest = await res.json();

    const groups = {};
    for (const item of manifest) {
      (groups[item.font] ??= []).push(item);
    }

    const root = document.getElementById('root');
    root.className = '';
    root.innerHTML = Object.entries(groups).map(([font, icons]) =>
      `<div class="section">
        <h2>${font}</h2>
        <div class="grid">${
          icons.map(i =>
            `<div class="card">
              ${i.character === ' ' ? '&nbsp;' : ''}
              <img src="fonts/${font}/${i.path.split('/').pop()}" alt="${i.character}" width="32" height="32">
              <span class="label">${i.path.split('/').pop()}</span>
            </div>`
          ).join('')
        }</div>
      </div>`
    ).join('');
  } catch (e) {
    document.getElementById('root').className = 'error';
    document.getElementById('root').textContent = 'Error: ' + e.message;
  }
})();
</script>
</body>
</html>
